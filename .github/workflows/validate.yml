name: validate

# 매니페스트와 스킬 frontmatter의 버전 일치 + JSON 유효성 검증.
# v1.2.0 릴리즈 때 수동으로 확인하던 항목을 자동화한다.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract versions
        id: v
        run: |
          PLUGIN=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKET=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          SKILL=$(grep -E '^version:' skills/Quetzalcoatl/SKILL.md | head -1 | sed -E 's/version:[[:space:]]*//')
          {
            echo "plugin=$PLUGIN"
            echo "market=$MARKET"
            echo "skill=$SKILL"
          } >> "$GITHUB_OUTPUT"
          echo "plugin.json=$PLUGIN  marketplace.json=$MARKET  SKILL.md=$SKILL"

      - name: Assert versions agree
        run: |
          if [ "${{ steps.v.outputs.plugin }}" != "${{ steps.v.outputs.market }}" ] || \
             [ "${{ steps.v.outputs.plugin }}" != "${{ steps.v.outputs.skill }}" ]; then
            echo "::error::Version mismatch — plugin=${{ steps.v.outputs.plugin }} marketplace=${{ steps.v.outputs.market }} skill=${{ steps.v.outputs.skill }}"
            exit 1
          fi
          echo "OK: all three agree on ${{ steps.v.outputs.plugin }}"

      - name: Validate JSON manifests
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json
          echo "OK: manifests are valid JSON."

      - name: Assert SKILL.md section numbering (no gap)
        run: |
          # 최상위 '## N.' 섹션 번호가 연속인지 확인 (§4 누락 같은 회귀 방지).
          # 코드펜스 안의 예시 헤더(미니 템플릿)는 제외하기 위해 펜스 토글로 스킵.
          nums=$(awk '
            /^```/ { infence = !infence; next }
            !infence && /^## [0-9]+\./ { match($0, /[0-9]+/); print substr($0, RSTART, RLENGTH) }
          ' skills/Quetzalcoatl/SKILL.md | tr "\n" " ")
          echo "Top-level sections: $nums"
          expected=0
          ok=1
          for n in $nums; do
            if [ "$n" -ne "$expected" ]; then ok=0; fi
            expected=$((expected + 1))
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Section numbers are not contiguous from 0: $nums"
            exit 1
          fi
          echo "OK: sections contiguous ($nums)"

      - name: Assert living-doc version sync (drift guard)
        run: |
          # 현재성(living) 문서·미러의 "현재 버전" 표기가 SSOT(plugin.json)와 일치하는지 검사.
          # §12 'living 문서 동기화' 규율을 CI 강제로 전환 (v1.4.1 교차검증 P1).
          SSOT=$(jq -r '.version' .claude-plugin/plugin.json)
          fail=0
          check() {
            if [ -z "$3" ]; then echo "::error::$1: version marker not found ($2)"; fail=1; return; fi
            if [ "$3" != "$SSOT" ]; then echo "::error::$1 drift — $2 = v$3 (SSOT v$SSOT)"; fail=1; return; fi
            echo "OK: $1 = v$3"
          }
          RUNBOOK=$(grep -oE '현재: v[0-9]+\.[0-9]+\.[0-9]+' docs/05-ops/RUNBOOK.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          DASH=$(grep -oE 'Quetzalcoatl v[0-9]+\.[0-9]+\.[0-9]+' docs/00-overview/DASHBOARD.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          MIRROR=$(grep -oE 'Quetzalcoatl[^0-9]+[0-9]+\.[0-9]+\.[0-9]+ Dashboard' docs/assets/dashboard.html | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          check "RUNBOOK deploy-current" docs/05-ops/RUNBOOK.md "$RUNBOOK"
          check "DASHBOARD title" docs/00-overview/DASHBOARD.md "$DASH"
          check "mirror title" docs/assets/dashboard.html "$MIRROR"
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "OK: living docs + mirror all synced to v$SSOT"
